name: Build and Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: gh-pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Inject
        env:
          A3A042: ${{ secrets.A3A042 }}
          B6A1F6: ${{ secrets.B6A1F6 }}
        run: |
          python3 -c "
          import os, sys, pathlib
          a, b = os.environ.get('A3A042', ''), os.environ.get('B6A1F6', '')
          html = pathlib.Path('index.html')
          text = html.read_text(encoding='utf-8')
          patched = text
          if a:
              patched = patched.replace('<!-- e829001e53f8eb7afe36f98d3f04b0 -->', a)
          if b:
              patched = patched.replace('<!--  -->', b)
          if patched == text and (a or b):
              sys.exit(1)
          if patched != text:
              html.write_text(patched, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: pages-deploy
        uses: actions/deploy-pages@v4
